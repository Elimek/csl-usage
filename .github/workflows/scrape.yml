name: Scrape CSL Usage

on:
  schedule:
    # ─── 更新频率设置 ──────────────────────────────
    # 当前: 每6小时 (香港时间 04:00 / 10:00 / 16:00 / 22:00)
    # ─── 可选频率 ──────────────────────────────────
    # 每1小时:  '0 * * * *'           → 约720次/月
    # 每2小时:  '0 */2 * * *'         → 约360次/月
    # 每3小时:  '0 */3 * * *'         → 约240次/月
    # 每6小时:  '0 */6 * * *'         → 约120次/月  (推荐·当前)
    # 每8小时:  '0 */8 * * *'         → 约90次/月
    # 每12小时: '0 */12 * * *'        → 约60次/月
    # 每天:     '0 8 * * *'           → 约30次/月
    #
    # 注意: cron用的是UTC时间。香港=UTC+8，
    # 所以 UTC 02/08/14/20 = 香港 10/16/22/04
    # ──────────────────────────────────────────────
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Run scraper
        run: python scripts/scraper.py
        env:
          CSL_USER: ${{ secrets.CSL_USER }}
          CSL_PASS: ${{ secrets.CSL_PASS }}

      - name: Commit and push data
        run: |
          git config user.name "CSL Usage Bot"
          git config user.email "bot@csl-usage.local"
          git add docs/data/history.json
          git diff --staged --quiet || git commit -m "chore: update usage data $(date +'%Y-%m-%d %H:%M')"
          git push
