name: Scrape CSL Usage

on:
  schedule:
    # ─── 更新频率设置 ──────────────────────────────
    # 当前: 每6小时一次
    # HKT 08:00 / 14:00 / 20:00 / 02:00
    #
    # cron用的是UTC时间，香港=UTC+8
    # 所以 0 */6 * * * = UTC 00/06/12/18 → HKT 08/14/20/02
    # ──────────────────────────────────────────────
    - cron: '0 */6 * * *'
  workflow_dispatch:

# GITHUB_TOKEN 需要写权限才能推回数据
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Run scraper
        run: python scripts/scraper.py
        env:
          CSL_USER: ${{ secrets.CSL_USER }}
          CSL_PASS: ${{ secrets.CSL_PASS }}

      - name: Commit and push data
        run: |
          git config user.name "CSL Usage Bot"
          git config user.email "bot@csl-usage.local"
          git add docs/data/history.json
          git diff --staged --quiet || git commit -m "chore: update usage data $(date +'%Y-%m-%d %H:%M')"
          git push
